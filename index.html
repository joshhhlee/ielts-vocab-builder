<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IELTS Vocabulary Builder</title>
<style>
  :root{
    --bg:#f4f1ea;--surface:#fff;--ink:#1f1d18;--muted:#6b6760;
    --line:rgba(31,29,24,0.12);--accent:#b5451b;
    --A2:#0f6e56;--A2bg:#e1f5ee;--B1:#0f6e56;--B1bg:#e1f5ee;
    --B2:#185fa5;--B2bg:#e6f1fb;--C1:#534ab7;--C1bg:#eeedfe;
    --C2:#993c1d;--C2bg:#faece7;--ok:#0f6e56;--warn:#854f0b;
    --gold:#854f0b;--goldbg:#faeeda;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    background:var(--bg);color:var(--ink);line-height:1.6;padding:2rem 1rem 4rem;}
  .wrap{max-width:760px;margin:0 auto;}
  header{margin-bottom:1.25rem;border-bottom:2px solid var(--ink);padding-bottom:1rem;}
  header h1{font-size:2rem;margin:0 0 4px;letter-spacing:-.02em;}
  header p{margin:0;color:var(--muted);font-size:.95rem;font-style:italic;}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .pill{font-size:.72rem;font-family:system-ui,sans-serif;padding:3px 11px;border-radius:999px;
    background:var(--A2bg);color:var(--ok);letter-spacing:.03em;}
  .wod{background:var(--goldbg);border:1px solid rgba(133,79,11,.25);border-left:3px solid var(--gold);
    border-radius:0 12px 12px 0;padding:.9rem 1.2rem;margin-bottom:1.25rem;}
  .wod .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);
    font-family:system-ui,sans-serif;font-weight:700;margin-bottom:4px;}
  .wod .w{font-size:1.5rem;font-weight:700;}
  .wod .pos{font-style:italic;color:var(--muted);font-size:.9rem;margin-left:6px;}
  .wod .d{color:var(--muted);margin:4px 0 6px;}
  .wod .e{font-size:.95rem;} .wod .e b{color:var(--accent);}
  .controls{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:1.1rem 1.2rem;margin-bottom:1.25rem;position:sticky;top:8px;z-index:5;}
  .search-row{display:flex;gap:10px;}
  input[type=text]{flex:1;font-family:inherit;font-size:1rem;padding:11px 14px;border:1px solid var(--line);
    border-radius:10px;background:var(--bg);color:var(--ink);}
  input:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .lookupBtn{font-family:inherit;font-size:.95rem;background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:0 18px;cursor:pointer;white-space:nowrap;}
  .lookupBtn:disabled{opacity:.5;cursor:default;}
  .levels{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .lvbtn{border:1px solid var(--line);background:transparent;border-radius:999px;padding:5px 15px;
    font-family:inherit;font-size:.85rem;cursor:pointer;color:var(--ink);}
  .lvbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .alpha{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;}
  .alpha button{border:none;background:transparent;font-family:inherit;font-size:.82rem;
    color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:6px;}
  .alpha button:hover,.alpha button.on{background:var(--ink);color:#fff;}
  .count{font-size:.82rem;color:var(--muted);font-family:system-ui,sans-serif;margin:0 0 10px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:1rem 1.25rem;margin-bottom:11px;}
  .card.live{border:1px solid var(--accent);}
  .word-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:5px;}
  .word{font-size:1.35rem;font-weight:700;}
  .pos{font-size:.85rem;font-style:italic;color:var(--muted);}
  .badge{font-size:.68rem;font-weight:700;padding:2px 10px;border-radius:999px;letter-spacing:.04em;
    font-family:system-ui,sans-serif;}
  .meaning{color:var(--muted);margin:0 0 9px;font-size:.97rem;}
  .example{background:var(--bg);border-radius:10px;padding:9px 13px;font-size:.96rem;margin-bottom:6px;}
  .example b{color:var(--accent);}
  .savebtn{font-family:system-ui,sans-serif;font-size:.8rem;border:1px solid var(--line);background:transparent;
    border-radius:8px;padding:5px 12px;cursor:pointer;color:var(--ink);margin-top:4px;}
  .savebtn:hover{border-color:var(--accent);} .savebtn.saved{background:var(--A2bg);color:var(--ok);border-color:transparent;}
  .more{display:block;width:100%;font-family:inherit;font-size:.95rem;background:var(--surface);
    border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer;color:var(--ink);margin-top:4px;}
  .more:hover{border-color:var(--accent);}
  .empty{text-align:center;color:var(--muted);padding:1.5rem;font-style:italic;}
  .section-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
    margin:2.25rem 0 10px;font-weight:700;font-family:system-ui,sans-serif;display:flex;
    justify-content:space-between;align-items:center;}
  .clearbtn{font-family:system-ui,sans-serif;font-size:.72rem;border:none;background:transparent;
    color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0;}
  textarea{width:100%;font-family:inherit;font-size:1rem;padding:12px 14px;border:1px solid var(--line);
    border-radius:10px;background:var(--surface);color:var(--ink);min-height:84px;resize:vertical;}
  button.go{font-family:inherit;font-size:1rem;font-weight:600;background:var(--accent);color:#fff;
    border:none;border-radius:10px;padding:11px 22px;cursor:pointer;margin-top:10px;}
  .feedback{margin-top:12px;padding:14px 18px;border-radius:12px;background:var(--surface);
    border:1px solid var(--line);font-size:.94rem;font-family:system-ui,sans-serif;}
  .fb-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;}
  .fb-ok{color:var(--ok);}.fb-warn{color:var(--warn);}
  .hidden{display:none;}
  .note{font-size:.8rem;color:var(--muted);font-family:system-ui,sans-serif;font-style:italic;margin-top:6px;}
  .study-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .study-bar select{font-family:inherit;font-size:.95rem;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;background:var(--surface);color:var(--ink);cursor:pointer;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{font-family:inherit;font-size:.9rem;padding:9px 16px;border:none;background:var(--surface);
    color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--ink);color:#fff;}
  .flash{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:2rem 1.5rem;
    text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;}
  .flash .fw{font-size:2rem;font-weight:700;}
  .flash .fp{font-style:italic;color:var(--muted);font-size:.95rem;margin-top:4px;}
  .flash .fhint{font-size:.8rem;color:var(--muted);font-family:system-ui,sans-serif;margin-top:18px;}
  .flash .fd{font-size:1.05rem;color:var(--ink);margin-top:14px;}
  .flash .fe{font-size:.95rem;background:var(--bg);border-radius:10px;padding:9px 13px;margin-top:14px;}
  .flash .fe b{color:var(--accent);}
  .grade{display:flex;gap:10px;margin-top:12px;}
  .grade button{flex:1;font-family:inherit;font-size:.95rem;padding:12px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);}
  .grade .know{background:var(--A2bg);color:var(--ok);border-color:transparent;}
  .grade .dunno{background:var(--C2bg);color:var(--C2);border-color:transparent;}
  .progress{font-size:.82rem;color:var(--muted);font-family:system-ui,sans-serif;text-align:center;margin-bottom:10px;}
  .qword{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:4px;}
  .qopts{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
  .qopt{font-family:inherit;font-size:.97rem;text-align:left;padding:13px 16px;border:1px solid var(--line);
    border-radius:11px;background:var(--surface);color:var(--ink);cursor:pointer;line-height:1.4;}
  .qopt:hover{border-color:var(--accent);}
  .qopt.correct{background:var(--A2bg);border-color:transparent;color:var(--ok);}
  .qopt.wrong{background:var(--C2bg);border-color:transparent;color:var(--C2);}
  .qopt:disabled{cursor:default;}
  .summary{text-align:center;padding:1.5rem;}
  .summary .big{font-size:2.4rem;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>IELTS Vocabulary Builder</h1>
    <p>Learn the meaning &amp; how to use every word</p>
    <div class="meta">
      <span class="pill" id="totalPill">loading…</span>
      <span class="pill" style="background:var(--C1bg);color:var(--C1);">no tokens used</span>
    </div>
  </header>

  <div class="wod" id="wod"></div>

  <div class="controls">
    <div class="search-row">
      <input type="text" id="search" placeholder="Search any word… (e.g. mitigate, crucial)" oninput="apply()" onkeydown="if(event.key==='Enter')liveLookup()" />
      <button class="lookupBtn" id="lookupBtn" onclick="liveLookup()">Explain</button>
    </div>
    <div class="note">Type a word, then tap <b>Explain</b> to fetch its full meaning &amp; examples from the dictionary.</div>
    <div class="levels" id="levels"></div>
    <div class="alpha" id="alpha"></div>
  </div>

  <div id="liveResult"></div>

  <div class="section-title" id="myTitle" style="display:none;">
    <span>My saved words (<span id="myCount">0</span>)</span>
    <button class="clearbtn" onclick="clearMine()">clear all</button>
  </div>
  <div id="myList"></div>

  <p class="count" id="count"></p>
  <div id="list"></div>
  <button class="more hidden" id="moreBtn" onclick="showMore()">Show more words</button>

  <div class="section-title">Flashcards &amp; quiz</div>
  <div class="study-bar">
    <select id="deckSel">
      <option value="mine">My saved words</option>
      <option value="A2">Level A2</option>
      <option value="B1">Level B1</option>
      <option value="B2" selected>Level B2</option>
      <option value="C1">Level C1</option>
      <option value="C2">Level C2</option>
      <option value="mixed">Mixed (random)</option>
    </select>
    <span class="seg">
      <button id="modeFlash" class="on" onclick="setMode('flash')">Flashcards</button>
      <button id="modeQuiz" onclick="setMode('quiz')">Quiz</button>
    </span>
    <button class="go" style="margin-top:0;" onclick="startStudy()">Start</button>
  </div>
  <div id="studyArea"></div>

  <div class="section-title">Practice — write a sentence using any word</div>
  <textarea id="practice" placeholder="Write a sentence using a word you just learned…"></textarea>
  <button class="go" onclick="checkSentence()">Check my sentence</button>
  <div id="feedback" class="feedback hidden"></div>
</div>

for exhibition","e":"The children like to visit the zoo, especially the monkey cage."}];
const PAGE = 40;
const LEVELS=["All","A2","B1","B2","C1","C2"];
const LVCOLOR={A2:["var(--A2)","var(--A2bg)"],B1:["var(--B1)","var(--B1bg)"],
  B2:["var(--B2)","var(--B2bg)"],C1:["var(--C1)","var(--C1bg)"],C2:["var(--C2)","var(--C2bg)"],
  NEW:["var(--gold)","var(--goldbg)"]};
let level="All",letter="",query="",shown=PAGE,filtered=BANK;
let myWords=loadMine();

document.getElementById("totalPill").textContent=BANK.length.toLocaleString()+" words built in";

// ---------- persistence (works when file is opened in a real browser) ----------
function loadMine(){try{return JSON.parse(localStorage.getItem("ielts_mywords")||"[]");}catch(e){return [];}}
function saveMine(){try{localStorage.setItem("ielts_mywords",JSON.stringify(myWords));}catch(e){}}

// ---------- word of the day (rotates daily, deterministic) ----------
function wordOfDay(){
  const today=new Date();const seed=today.getFullYear()*1000+ (Math.floor((today-new Date(today.getFullYear(),0,0))/86400000));
  const x=BANK[seed%BANK.length];
  document.getElementById("wod").innerHTML=
    `<div class="lbl">Word of the day · ${today.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})}</div>
     <div><span class="w">${x.w}</span><span class="pos">${x.p}</span> ${badge(x.l)}</div>
     <div class="d">${x.d}</div><div class="e">${hl(x.e,x.w)}</div>`;
}

// ---------- helpers ----------
function badge(l){const[fg,bg]=LVCOLOR[l]||["#444","#eee"];
  return `<span class="badge" style="color:${fg};background:${bg};">${l}</span>`;}
function hl(s,w){const b=w.split(/[ /]/)[0];return s.replace(new RegExp(`(${b}[a-z]*)`,"gi"),"<b>$1</b>");}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ---------- level + alphabet controls ----------
const lvWrap=document.getElementById("levels");
LEVELS.forEach(l=>{const b=document.createElement("button");b.className="lvbtn"+(l==="All"?" active":"");
  b.textContent=l;b.onclick=()=>{level=l;[...lvWrap.children].forEach(x=>x.classList.remove("active"));
  b.classList.add("active");apply();};lvWrap.appendChild(b);});
const alphaWrap=document.getElementById("alpha");
["All",..."abcdefghijklmnopqrstuvwxyz".split("")].forEach(ch=>{const b=document.createElement("button");
  b.textContent=ch==="All"?"All":ch.toUpperCase();if(ch==="All")b.classList.add("on");
  b.onclick=()=>{letter=ch==="All"?"":ch;[...alphaWrap.children].forEach(x=>x.classList.remove("on"));
  b.classList.add("on");apply();};alphaWrap.appendChild(b);});

// ---------- main list ----------
function apply(){
  query=document.getElementById("search").value.trim().toLowerCase();
  filtered=BANK.filter(x=>{
    if(level!=="All"&&x.l!==level)return false;
    if(letter&&!x.w.startsWith(letter))return false;
    if(query&&!x.w.includes(query)&&!x.d.toLowerCase().includes(query))return false;
    return true;});
  shown=PAGE;render();
}
function cardHTML(x,opts={}){
  const isSaved=myWords.some(m=>m.w===x.w);
  const save=opts.noSave?"":`<button class="savebtn ${isSaved?'saved':''}" onclick='toggleSave(${JSON.stringify(JSON.stringify(x))})'>${isSaved?'✓ saved':'+ save to my words'}</button>`;
  return `<div class="card ${opts.live?'live':''}">
    <div class="word-row"><span class="word">${esc(x.w)}</span><span class="pos">${esc(x.p)}</span>${badge(x.l)}</div>
    <p class="meaning">${esc(x.d)}</p>
    <div class="example">${hl(esc(x.e),x.w)}</div>${save}</div>`;
}
function render(){
  const list=document.getElementById("list");
  document.getElementById("count").textContent=filtered.length.toLocaleString()+" word"+(filtered.length===1?"":"s")+" in the built-in list";
  if(!filtered.length){list.innerHTML='<p class="empty">Not in the built-in list — tap <b>Explain</b> to look it up live.</p>';
    document.getElementById("moreBtn").classList.add("hidden");}
  else{list.innerHTML=filtered.slice(0,shown).map(x=>cardHTML(x)).join("");
    document.getElementById("moreBtn").classList.toggle("hidden",shown>=filtered.length);}
  renderMine();
}
function showMore(){shown+=PAGE;render();}

// ---------- saved words ----------
function toggleSave(jsonStr){
  const x=JSON.parse(jsonStr);const i=myWords.findIndex(m=>m.w===x.w);
  if(i>=0)myWords.splice(i,1);else myWords.unshift(x);
  saveMine();render();
}
function clearMine(){if(confirm("Remove all saved words?")){myWords=[];saveMine();render();}}
function renderMine(){
  document.getElementById("myCount").textContent=myWords.length;
  document.getElementById("myTitle").style.display=myWords.length?"flex":"none";
  document.getElementById("myList").innerHTML=myWords.map(x=>cardHTML(x)).join("");
}

// ---------- live dictionary lookup (free public dictionary, no tokens) ----------
async function liveLookup(){
  const word=document.getElementById("search").value.trim().toLowerCase();
  const box=document.getElementById("liveResult");
  if(!word){box.innerHTML="";return;}
  const btn=document.getElementById("lookupBtn");btn.disabled=true;btn.textContent="…";
  box.innerHTML='<div class="card live"><p class="empty">Looking up “'+esc(word)+'” …</p></div>';
  try{
    const res=await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word));
    if(!res.ok)throw new Error("notfound");
    const data=await res.json();
    const entries=[];
    (data||[]).forEach(entry=>{
      (entry.meanings||[]).forEach(m=>{
        (m.definitions||[]).slice(0,2).forEach(d=>{
          entries.push({w:entry.word,p:m.partOfSpeech||"",l:"NEW",
            d:d.definition||"",e:d.example||"(no example available — try using it in your own sentence)"});
        });
      });
    });
    if(!entries.length)throw new Error("empty");
    box.innerHTML='<div class="section-title" style="margin-top:1rem;"><span>Dictionary result</span></div>'+
      entries.slice(0,4).map(x=>cardHTML(x,{live:true})).join("");
  }catch(e){
    box.innerHTML='<div class="card live"><p class="empty">Couldn’t find “'+esc(word)+'”. '+
      'Check the spelling, or note: live lookup needs internet and works best when you open this file in a web browser (Chrome/Safari).</p></div>';
  }finally{btn.disabled=false;btn.textContent="Explain";}
}

// ---------- flashcards & quiz ----------
let studyMode="flash",deck=[],idx=0,score=0,known=0;
function setMode(m){studyMode=m;
  document.getElementById("modeFlash").classList.toggle("on",m==="flash");
  document.getElementById("modeQuiz").classList.toggle("on",m==="quiz");}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(){
  const sel=document.getElementById("deckSel").value;let pool;
  if(sel==="mine")pool=myWords.slice();
  else if(sel==="mixed")pool=BANK.slice();
  else pool=BANK.filter(x=>x.l===sel);
  return shuffle(pool).slice(0,20);
}
function startStudy(){
  deck=buildDeck();idx=0;score=0;known=0;
  const area=document.getElementById("studyArea");
  if(!deck.length){area.innerHTML='<div class="card"><p class="empty">This deck is empty. Save some words first, or pick a level.</p></div>';return;}
  studyMode==="flash"?showFlash():showQuiz();
}
function studyProgress(){return `<div class="progress">Card ${idx+1} of ${deck.length}</div>`;}

// flashcards
function showFlash(){
  const x=deck[idx];
  document.getElementById("studyArea").innerHTML=studyProgress()+
    `<div class="flash" onclick="revealFlash()">
       <div><span class="fw">${esc(x.w)}</span></div>
       <div class="fp">${esc(x.p)} · ${x.l}</div>
       <div class="fhint">tap to reveal meaning</div>
     </div>`;
}
function revealFlash(){
  const x=deck[idx];
  document.getElementById("studyArea").innerHTML=studyProgress()+
    `<div class="flash">
       <div><span class="fw">${esc(x.w)}</span></div>
       <div class="fp">${esc(x.p)} · ${x.l}</div>
       <div class="fd">${esc(x.d)}</div>
       <div class="fe">${hl(esc(x.e),x.w)}</div>
     </div>
     <div class="grade">
       <button class="dunno" onclick="gradeFlash(false)">Still learning</button>
       <button class="know" onclick="gradeFlash(true)">I knew it</button>
     </div>`;
}
function gradeFlash(ok){if(ok)known++;idx++;idx<deck.length?showFlash():finishStudy();}

// quiz
function showQuiz(){
  const x=deck[idx];
  const others=shuffle(BANK.filter(b=>b.w!==x.w&&b.d!==x.d)).slice(0,3);
  const opts=shuffle([x,...others]);
  document.getElementById("studyArea").innerHTML=studyProgress()+
    `<div class="card"><div class="qword">${esc(x.w)}</div>
       <div class="progress">Which meaning is correct?</div>
       <div class="qopts">${opts.map(o=>
         `<button class="qopt" onclick='answerQuiz(this,${o.d===x.d})'>${esc(o.d)}</button>`).join("")}</div>
     </div>`;
}
function answerQuiz(btn,correct){
  const opts=btn.parentElement.querySelectorAll(".qopt");
  const right=deck[idx].d;
  opts.forEach(o=>{o.disabled=true;
    if(o.textContent===right)o.classList.add("correct");});
  if(correct)score++;else btn.classList.add("wrong");
  setTimeout(()=>{idx++;idx<deck.length?showQuiz():finishStudy();},900);
}

function finishStudy(){
  const total=deck.length;
  const val=studyMode==="flash"?known:score;
  const pct=Math.round(val/total*100);
  document.getElementById("studyArea").innerHTML=
    `<div class="card summary">
       <div class="big">${val} / ${total}</div>
       <p class="meaning">${pct}% ${studyMode==="flash"?"marked as known":"correct"}</p>
       <button class="go" onclick="startStudy()">Study again</button>
     </div>`;
}

// ---------- practice checker (offline) ----------
function checkSentence(){
  const raw=document.getElementById("practice").value.trim();
  const fb=document.getElementById("feedback");fb.classList.remove("hidden");
  if(!raw){fb.innerHTML='<div class="fb-line fb-warn">• Please write a sentence first.</div>';return;}
  const lower=raw.toLowerCase();const lines=[];
  const pool=BANK.concat(myWords);const hit=pool.find(x=>lower.includes(x.w));
  if(hit)lines.push(["ok",`Great — you used "${hit.w}".`]);
  else lines.push(["warn","Try to include a word you learned above."]);
  lines.push(/^[A-Z]/.test(raw)?["ok","Starts with a capital letter."]:["warn","Start with a capital letter."]);
  lines.push(/[.!?]$/.test(raw)?["ok","Ends with proper punctuation."]:["warn","End with a full stop (.)."]);
  if(/\bi\b/.test(raw))lines.push(["warn",'Write "I" as a capital letter, always.']);
  const wc=raw.split(/\s+/).length;
  if(wc<6)lines.push(["warn",`Only ${wc} words — aim for 10+ to show range.`]);
  else if(wc>40)lines.push(["warn",`${wc} words — very long; consider splitting it.`]);
  else lines.push(["ok",`Good length (${wc} words).`]);
  const link=["because","although","which","that","however","therefore","while","since","whereas"];
  if(link.some(l=>lower.includes(l)))lines.push(["ok","Nice — a linking word shows complex structure."]);
  else lines.push(["warn","Add a linker (because, although, which…) for a complex sentence."]);
  fb.innerHTML=lines.map(([t,m])=>`<div class="fb-line fb-${t}">${t==="ok"?"✓":"•"} <span>${m}</span></div>`).join("");
}

wordOfDay();render();
</script>
